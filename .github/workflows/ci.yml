name: NexusHub CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: '3.29.3'
  JAVA_VERSION: '17'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Análise estática e formatação ──
  analyze:
    name: Analyze & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed lib/ || true

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

  # ── Testes unitários ──
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: analyze
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test --coverage || true

      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: frontend/coverage/lcov.info
          if-no-files-found: ignore

  # ── Build Android (APK) ──
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Criar projeto Flutter nativo se não existir
      - name: Ensure native project exists
        run: |
          if [ ! -f "android/app/src/main/AndroidManifest.xml" ] || [ ! -f "android/settings.gradle" ]; then
            flutter create --project-name amino_clone --org com.nexushub --platforms android .
          fi

      # Fix: "Cannot run Project.afterEvaluate when project is already evaluated"
      # Caused by third-party plugins (agora_rtc_engine/iris_method_channel) using
      # rootProject.allprojects {} which forces early evaluation of subprojects.
      # See: https://github.com/flutter/flutter/issues/180899
      - name: Patch flutter.groovy (fix afterEvaluate race condition)
        working-directory: ${{ github.workspace }}
        run: python3 scripts/patch_flutter_groovy.py

      # Decodificar google-services.json do secret (ou usar placeholder)
      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json
          else
            echo "Using placeholder google-services.json for debug build"
          fi

      # Decodificar keystore do secret
      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/nexushub-release.jks
          echo "storeFile=nexushub-release.jks" >> android/key.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties

      - name: Build APK (debug)
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nexushub-debug-apk
          path: frontend/build/app/outputs/flutter-apk/app-debug.apk

  # ── Build Android (AAB para Play Store) ──
  build-release:
    name: Build Release AAB
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'release:')
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Ensure native project exists
        run: |
          if [ ! -f "android/app/src/main/AndroidManifest.xml" ] || [ ! -f "android/settings.gradle" ]; then
            flutter create --project-name amino_clone --org com.nexushub --platforms android .
          fi

      - name: Patch flutter.groovy (fix afterEvaluate race condition)
        working-directory: ${{ github.workspace }}
        run: python3 scripts/patch_flutter_groovy.py

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/nexushub-release.jks
          echo "storeFile=nexushub-release.jks" >> android/key.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: nexushub-release-aab
          path: frontend/build/app/outputs/bundle/release/app-release.aab

  # ── Deploy Edge Functions ──
  deploy-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy functions
        if: env.SUPABASE_ACCESS_TOKEN != ''
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          cd backend/supabase
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy push-notification --no-verify-jwt
          supabase functions deploy delete-user-data
          supabase functions deploy export-user-data
          supabase functions deploy webhook-handler --no-verify-jwt
